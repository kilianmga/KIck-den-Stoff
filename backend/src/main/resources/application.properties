app.cors.allowed-origin-patterns=${FRONTEND_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://127.0.0.1:5173,http://*:5173,http://localhost:5174,http://127.0.0.1:5174,http://*:5174}

spring.servlet.multipart.max-file-size=10MB
